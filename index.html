<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal: 7 Взаимодействий</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #050508; color: #fff; font-family: 'Courier New', monospace; min-height: 100vh; padding: 15px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
  
  .header { text-align: center; width: 100%; max-width: 400px; }
  .zone-name { font-size: 24px; font-weight: bold; text-shadow: 0 0 15px currentColor; margin-bottom: 5px; }
  .g-display { font-size: 34px; font-weight: bold; }

  canvas { width: 100%; max-width: 400px; height: 120px; border-radius: 15px; background: #0002; border: 1px solid #ffffff11; }

  .controls-grid { 
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; 
    background: #ffffff05; padding: 15px; border-radius: 15px; border: 1px solid #ffffff0a;
  }
  .param-box { display: flex; flex-direction: column; gap: 4px; }
  .param-label { font-size: 10px; color: #666; display: flex; justify-content: space-between; }
  .param-label span { color: #aaa; font-weight: bold; }
  
  input[type=range] { width: 100%; cursor: pointer; accent-color: var(--c); }

  .sequence-input {
    width: 100%; max-width: 400px; background: #111; border: 1px solid #333;
    padding: 12px; border-radius: 10px; text-align: center; color: #00ff88;
    font-size: 18px; letter-spacing: 5px; font-weight: bold; outline: none;
  }

  .stats { 
    width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    font-size: 11px; background: #ffffff03; padding: 10px; border-radius: 10px;
  }
  .stat-item { border-left: 1px solid #333; padding-left: 8px; }
  
  .formula-box { font-size: 9px; color: #444; text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<div class="header">
  <div id="zoneName" class="zone-name">ОЖИДАНИЕ</div>
  <div class="g-display">G = <span id="gVal">0.0000</span></div>
</div>

<canvas id="viz"></canvas>

<input type="text" id="seqIn" class="sequence-input" placeholder="7 ЦИФР ПИ" maxlength="7" value="9898989">

<div class="controls-grid" id="controls">
  <!-- Слайдеры создаются скриптом -->
</div>

<div class="stats">
  <div class="stat-item">ВЕРХ (Growth): <span id="valTop" style="color:#00ff88"></span></div>
  <div class="stat-item">НИЗ (Cost): <span id="valBot" style="color:#ff44aa"></span></div>
  <div class="stat-item">G / G_res: <span id="valRes"></span></div>
  <div class="stat-item">G / φ: <span id="valPhi"></span></div>
</div>

<div class="formula-box">
  G = (π · α · ω · θ) / (L · λ · η · Pₐ · e)
</div>

<script>
const PI = Math.PI, E = Math.E, PHI = (1+Math.sqrt(5))/2;
const G_RES = E/PHI;

const PARAMS = [
  { id: 'alpha', label: 'α (Амплитуда)', color: '#ff2244' },
  { id: 'omega', label: 'ω (Частота)',   color: '#ff8800' },
  { id: 'theta', label: 'θ (Фаза)',     color: '#ffdd00' },
  { id: 'L',     label: 'L (Глубина)',   color: '#00ccff' },
  { id: 'lambda',label: 'λ (Память)',    color: '#aa88ff' },
  { id: 'eta',   label: 'η (Искренность)',color: '#ff44aa' },
  { id: 'pa',    label: 'Pa (Прогноз)',  color: '#00ff88' }
];

const ZONES = [
  { name:"💀 РАСПАД",   max:1/E,     color:"#ff2244" },
  { name:"😴 СПЯЧКА",   max:PI/2,    color:"#ff8800" },
  { name:"⚡ ДЕСИНХР.", max:G_RES,   color:"#ffdd00" },
  { name:"🌀 РЕЗОНАНС", max:PHI*PHI, color:"#00ff88" },
  { name:"🚀 ПЕРЕХОД",  max:E,       color:"#00ccff" },
  { name:"📈 РОСТ",     max:2*PHI,   color:"#aa88ff" },
  { name:"🌪️ ХАОС",    max:10,      color:"#ff44aa" }
];

const state = { alpha: 9, omega: 8, theta: 9, L: 8, lambda: 9, eta: 8, pa: 9 };

const grid = document.getElementById('controls');
PARAMS.forEach(p => {
  const box = document.createElement('div');
  box.className = 'param-box';
  box.innerHTML = `
    <div class="param-label">${p.label} <span id="val_${p.id}">${state[p.id]}</span></div>
    <input type="range" id="slip_${p.id}" min="1" max="9" step="1" value="${state[p.id]}" style="--c:${p.color}">
  `;
  grid.appendChild(box);
  
  const slider = box.querySelector('input');
  slider.addEventListener('input', (e) => {
    state[p.id] = parseInt(e.target.value);
    document.getElementById(`val_${p.id}`).textContent = state[p.id];
    updateSeqFromSliders();
    calculate();
  });
});

const seqIn = document.getElementById('seqIn');
seqIn.addEventListener('input', (e) => {
  const val = e.target.value.replace(/\D/g, '').substring(0, 7);
  e.target.value = val;
  if(val.length === 7) {
    const digits = val.split('').map(Number);
    PARAMS.forEach((p, i) => {
      state[p.id] = digits[i] || 1;
      document.getElementById(`slip_${p.id}`).value = state[p.id];
      document.getElementById(`val_${p.id}`).textContent = state[p.id];
    });
    calculate();
  }
});

function updateSeqFromSliders() {
  seqIn.value = PARAMS.map(p => state[p.id]).join('');
}

function calculate() {
  const n = (id) => state[id] / 9;
  const top = PI * n('alpha') * n('omega') * n('theta');
  const bot = n('L') * n('lambda') * n('eta') * n('pa') * E;
  const G = top / bot;

  const z = ZONES.find(z => G <= z.max) || ZONES[ZONES.length-1];
  
  document.getElementById('gVal').textContent = G.toFixed(4);
  document.getElementById('gVal').style.color = z.color;
  document.getElementById('zoneName').textContent = z.name;
  document.getElementById('zoneName').style.color = z.color;
  
  document.getElementById('valTop').textContent = top.toFixed(3);
  document.getElementById('valBot').textContent = bot.toFixed(3);
  document.getElementById('valRes').textContent = (G/G_RES).toFixed(3);
  document.getElementById('valPhi').textContent = (G/PHI).toFixed(3);
  
  currentG = G;
  currentColor = z.color;
}

// Viz
const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');
let currentG = 1.0;
let currentColor = '#fff';
let t = 0;

function draw() {
  t += 0.02;
  const W = canvas.width = canvas.offsetWidth;
  const H = canvas.height = 120;
  ctx.clearRect(0,0,W,H);

  // Центр
  const cx = W/2, cy = H/2;
  
  // Волны параметров
  PARAMS.forEach((p, i) => {
    const val = state[p.id] / 9;
    const r = 20 + i * 8;
    ctx.beginPath();
    ctx.arc(cx, cy, r + Math.sin(t + i)*2*val, 0, PI*2);
    ctx.strokeStyle = p.color + '22';
    ctx.stroke();
  });

  // Основной пульс
  const pulse = 30 + Math.sin(t * currentG)*10;
  ctx.beginPath();
  ctx.arc(cx, cy, pulse, 0, PI*2);
  ctx.fillStyle = currentColor + '33';
  ctx.fill();
  ctx.strokeStyle = currentColor;
  ctx.lineWidth = 2;
  ctx.stroke();

  requestAnimationFrame(draw);
}

calculate();
draw();
</script>
</body>
</html>
